# go-file-sync configuration file
# Global settings applied to all tasks.

log:
  level: info
  output: console
  file:
    path: ./logs/sync.log
    max_size: 100
    max_backups: 7
    compress: true

watch:
  debounce: 500
  interval: 100
  workers: 0
  hot_reload: false

sync:
  mode: incremental
  workers: 4
  backup: true
  verify: true
  preserve_permissions: false
  preserve_owner: false
  preserve_timestamps: false
  symlinks: "follow"
  bandwidth_limit: 0
  conflict_detection: false
  conflict_resolution: "warn"
  exclude:
    - "*.tmp"
    - "*.log"
    - ".git/"
    - "node_modules/"
    - ".DS_Store"
    - "*.swp"
  include: []
  encryption:
    enabled: false
    algorithm: "aes-256-gcm"
    key_file: ""
    key_env: ""

conf:
  dir: ./conf
  entry:
    - sync.conf

history:
  enabled: false
  path: ./sync-history.jsonl
  max_entries: 10000

web:
  enabled: false
  listen: ":8080"
  dashboard: false

shutdown:
  timeout: 30
