# Entry configuration for go-file-sync
# Define your sync tasks here. This file can inherit from other .conf files.

[task]
name = "development-sync"
source = "./src"
target = "./dist"
mode = "sync"
exclude = ["*.bak"]
include = []
delete_orphans = false

[watch]
recursive = true
events = ["create", "write", "remove", "rename"]
debounce = 500

[inherit]
# Parent conf file to inherit from (optional)
# file = "base.conf"
